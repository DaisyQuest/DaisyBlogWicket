name: Build and deploy TomEE Wicket app to Azure Web App - daisyblog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Azure deployment ZIP with Gradle
        run: ./gradlew clean test azureDeployZip --no-daemon

      - name: Upload Azure deployment ZIP
        uses: actions/upload-artifact@v4
        with:
          name: daisyblog-azure
          path: build/distributions/daisyblog-azure.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Azure deployment ZIP
        uses: actions/download-artifact@v4
        with:
          name: daisyblog-azure

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'daisyblog'
          slot-name: 'Production'
          package: daisyblog-azure.zip
          type: ZIP
          clean: true
          startup-command: bash startup.sh
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2C5EFB5B211841E5ADCC8DC9F61863A6 }}
